<!DOCTYPE html>
<html>
<head><title>Adarsh Web Design</title></head>
<body style="text-align:center; padding:50px; font-family:Arial;">
  <h1>Adarsh Web Designer</h1>
  <p>Lead form neeche hai</p>
  
  <form id="leadForm" style="max-width:400px; margin:auto; display:flex; flex-direction:column; gap:10px;">
    <input name="name" placeholder="Naam" required>
    <input name="phone" placeholder="Phone" required>
    <input name="business" placeholder="Business">
    <textarea name="text" placeholder="Message"></textarea>
    <button>Submit</button>
  </form>

<script>
const URL = 'https://pjkjmhyyqjtbgbxhgaif.supabase.co';
const KEY = 'sb_publishable_Jbobx21kieaYH8fHyAOlCg_lcSgjAqf';
document.getElementById('leadForm').onsubmit = async (e) => {
  e.preventDefault();
  const data = {...Object.fromEntries(new FormData(e.target)), type:'Customer', status:'New'}
  await fetch(URL+'/rest/v1/adarshwebdesigner', {method:'POST', headers:{apikey:KEY, Authorization:'Bearer '+KEY, 'Content-Type':'application/json'}, body:JSON.stringify(data)});
  alert('Lead Bhej diya!'); e.target.reset();
}
</script>
</body>
</html>
