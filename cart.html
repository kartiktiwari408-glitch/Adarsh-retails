
<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - adarsh retails</title>
<style>
body { font-family: Arial; background: #fff8f0; padding: 20px; }
h1 { color: #d35400; }
.item { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
button { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
a { color: #d35400; text-decoration: none; font-weight: bold; }
</style>
</head>
<body>
<h1>🛒 Your Cart</h1>
<div id="cart-items"></div>
<button onclick="clearCart()">Clear Cart</button>
  <button onclick="orderWhatsApp()" style="background: #25D366; margin-top: 10px;">Order on WhatsApp</button>
<br><br>
<a href="index.html">← Back to Shop</a>

<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];
const cartDiv = document.getElementById('cart-items');

function displayCart() {
  if (cart.length === 0) {
    cartDiv.innerHTML = '<p>Cart is empty!</p>';
    return;
  }
  cartDiv.innerHTML = '';
  cart.forEach((item, index) => {
    cartDiv.innerHTML += '<div class="item">' + (index+1) + '. ' + item + '</div>';
  });
}

function clearCart() {
  localStorage.removeItem('cart');
  cart = [];
  displayCart();
  alert('Cart cleared!');
}
function orderWhatsApp() {
  if (cart.length === 0) {
    alert('Cart is empty!');
    return;
  }
  
  let message = 'New Order from Shankar Store:%0A%0A';
  cart.forEach((item, index) => {
    message += (index+1) + '. ' + item + '%0A';
  });
  
  let phone = '918298827509';
  window.open('https://wa.me/' + phone + '?text=' + message, '_blank');
  }
displayCart();
</script>
</body>
</html>
