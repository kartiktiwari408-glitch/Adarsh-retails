
<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - adarsh retails</title>
<style>
body { font-family: Arial; background: #fff8f0; padding: 20px; }
h1 { color: #d35400; }
.item { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
button { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
a { color: #d35400; text-decoration: none; font-weight: bold; }
</style>
</head>
<body>
<h1>🛒 Your Cart</h1>
<div id="cart-items"></div>
<button onclick="clearCart()">Clear Cart</button>
  <button onclick="orderWhatsApp()" style="background: #25D366; margin-top: 10px;">Order on WhatsApp</button>
<br><br>
<a href="index.html">← Back to Shop</a>

<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];
const cartDiv = document.getElementById('cart-items');

function displayCart() {
  if (cart.length === 0) {
    cartDiv.innerHTML = '<p>Cart is empty!</p>';
    return;
  }
  cartDiv.innerHTML = '';
  cart.forEach((item, index) => {
    cartDiv.innerHTML += '<div class="item">' + (index+1) + '. ' + item + '</div>';
  });
}

function clearCart() {
  localStorage.removeItem('cart');
  cart = [];
  displayCart();
  alert('Cart cleared!');
}
 function orderWhatsApp() {
  if (cart.length === 0) {
    alert('Cart is empty!');
    return;
  }
  
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      sendOrder(position.coords.latitude, position.coords.longitude);
    }, function() {
      sendOrder(null, null);
    });
  } else {
    sendOrder(null, null);
  }
}

function sendOrder(lat, lng) {
  let message = 'New Order from Adarsh Retails:%0A%0A';
  
  cart.forEach((item, index) => {
    // अगर item object है तो name दिखाओ, वरना direct item
    let itemName = item.name || item;
    message += (index+1) + '. ' + itemName + '%0A';
  });
  
  if (lat && lng) {
    message += '%0A%0A📍 Customer Location:%0A';
    message += 'https://maps.google.com/?q=' + lat + ',' + lng + '%0A';
    message += 'Coordinates: ' + lat.toFixed(6) + ', ' + lng.toFixed(6);
  } else {
    message += '%0ALocation: Not shared';
  }
  
  let phone = '918298827509';
  window.open('https://wa.me/' + phone + '?text=' + message, '_blank');
}
  }
}


displayCart();
</script>
</body>
</html>
