<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cart - आदर्श रिटेल्स</title>
<style>
:root {
  --ar-primary: #4A148C;
  --ar-accent: #FFD700;
  --ar-bg: #F3E5F5;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  max-width: 100vw!important;
  overflow-x: hidden!important;
  font-family: 'Segoe UI', sans-serif;
  background: var(--ar-bg);
}
.header {
  background: linear-gradient(135deg, #4A148C 0%, #7B1FA2 100%);
  color: white;
  padding: 15px;
  display: flex;
  align-items: center;
  gap: 15px;
  box-shadow: 0 4px 20px rgba(74, 20, 140, 0.3);
}
.ar-logo {
  background: var(--ar-accent);
  color: var(--ar-primary);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 18px;
  box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
}
.back-btn {
  color: white;
  text-decoration: none;
  font-size: 24px;
  font-weight: bold;
}
.cart-container {
  padding: 15px;
  max-width: 600px;
  margin: 0 auto;
}
.cart-title {
  color: var(--ar-primary);
  font-size: 28px;
  font-weight: 900;
  margin: 15px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}
.cart-item {
  background: white;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 12px;
  box-shadow: 0 2px 10px rgba(74, 20, 140, 0.1);
  border-left: 4px solid var(--ar-accent);
}
.item-top {
  display: flex;
  justify-content: space-between;
  align-items: start;
  margin-bottom: 8px;
}
.item-name {
  font-weight: bold;
  font-size: 16px;
  color: var(--ar-primary);
  flex: 1;
}
.item-price {
  font-weight: bold;
  font-size: 18px;
  color: #00C853;
}
.item-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.qty-control {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--ar-bg);
  padding: 5px 10px;
  border-radius: 20px;
}
.qty-btn {
  background: var(--ar-primary);
  color: white;
  border: none;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  font-weight: bold;
  font-size: 18px;
  cursor: pointer;
}
.qty-display {
  font-weight: bold;
  min-width: 20px;
  text-align: center;
}
.remove-item {
  background: #f44336;
  color: white;
  border: none;
  padding: 6px 12px;
  border-radius: 15px;
  font-size: 12px;
  font-weight: bold;
}
.total-section {
  background: white;
  border-radius: 12px;
  padding: 20px;
  margin-top: 20px;
  box-shadow: 0 4px 15px rgba(74, 20, 140, 0.15);
  border: 2px solid var(--ar-accent);
}
.total-row {
  display: flex;
  justify-content: space-between;
  margin: 8px 0;
  font-size: 16px;
}
.coupon-row {
  color: #00C853;
  font-weight: bold;
}
.total-final {
  font-size: 22px;
  font-weight: 900;
  color: var(--ar-primary);
  border-top: 2px dashed var(--ar-accent);
  padding-top: 12px;
  margin-top: 12px;
}
.action-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 20px;
}
.btn {
  padding: 14px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  font-size: 14px;
  cursor: pointer;
}
.btn-clear {
  background: #f44336;
  color: white;
}
.btn-advance {
  background: linear-gradient(135deg, #00C853, #64DD17);
  color: white;
  grid-column: span 2;
  font-size: 16px;
  box-shadow: 0 4px 15px rgba(0, 200, 83, 0.3);
}
.btn-cod {
  background: linear-gradient(135deg, #2196F3, #03A9F4);
  color: white;
  grid-column: span 2;
}
.empty-cart {
  text-align: center;
  padding: 60px 20px;
  color: #999;
}
.empty-cart-icon {
  font-size: 80px;
  margin-bottom: 20px;
}
.back-shop {
  color: var(--ar-primary);
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;
  display: inline-block;
  margin-top: 20px;
}
.payment-section {
  background: white;
  padding: 20px;
  margin: 15px 0;
  border-radius: 12px;
  text-align: center;
  border: 2px solid var(--ar-accent);
  display: none;
}
</style>
</head>
<body>
<div class="header">
  <a href="index.html" class="back-btn">←</a>
  <div class="ar-logo">AR</div>
  <div style="font-size:18px;font-weight:bold;">आदर्श रिटेल्स - Cart</div>
</div>

<div class="cart-container">
  <h1 class="cart-title">🛒 Your Cart</h1>

  <div id="cartItems"></div>

  <div id="cartTotal" style="display:none;">
    <div class="total-section">
      <div class="total-row">
        <span>Subtotal:</span>
        <span id="subtotal">₹0</span>
      </div>
      <div class="total-row">
        <span>Delivery:</span>
        <span id="delivery">₹40</span>
      </div>
      <div class="total-row coupon-row" id="couponRow" style="display:none;">
        <span>Coupon Discount:</span>
        <span id="discount">-₹0</span>
      </div>
      <div class="total-row total-final">
        <span>Total Amount:</span>
        <span id="total">₹0</span>
      </div>

      <div class="action-buttons">
        <button class="btn btn-clear" onclick="clearCart()">Clear Cart</button>
        <button class="btn btn-advance" onclick="showPayment()">
          Pay Full Amount ₹<span id="advanceAmount">0</span>
        </button>
        <button class="btn btn-cod" onclick="cashOnDelivery()">Cash on Delivery</button>
      </div>
    </div>

    <div class="payment-section" id="paymentSection">
      <h3 style="color:var(--ar-primary);">Scan & Pay</h3>
      <p style="font-size:20px;color:#00C853;font-weight:bold;margin:10px 0;">₹<span id="payAmount">0</span></p>
      <img id="qrCode" src="" style="width:200px;margin:10px 0;border:2px solid var(--ar-accent);border-radius:10px;">
      <p style="color:green;font-size:14px;">1. Scan QR & Pay</p>
      <p style="color:red;font-size:14px;">2. Upload payment screenshot</p>
      <input type="file" id="screenshot" accept="image/*" style="margin:10px 0;width:100%;">
      <button onclick="submitAdvance()" style="background:#25D366;color:white;padding:12px;border:none;border-radius:8px;width:100%;font-weight:bold;">Payment Done - Place Order</button>
    </div>
  </div>

  <div id="emptyCart" class="empty-cart">
    <div class="empty-cart-icon">🛒</div>
    <h2>Cart is empty!</h2>
    <p style="margin:15px 0;">Add some products to get started</p>
    <a href="index.html" class="back-shop">← Back to Shop</a>
  </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem('arCart')) || [];
let usedCoupons = JSON.parse(localStorage.getItem('arUsedCoupons')) || [];

function renderCart() {
  const cartDiv = document.getElementById('cartItems');
  const totalDiv = document.getElementById('cartTotal');
  const emptyDiv = document.getElementById('emptyCart');

  if(cart.length === 0) {
    cartDiv.innerHTML = '';
    totalDiv.style.display = 'none';
    emptyDiv.style.display = 'block';
    return;
  }

  emptyDiv.style.display = 'none';
  totalDiv.style.display = 'block';

  let subtotal = 0;
  cartDiv.innerHTML = cart.map((item, index) => {
    let itemTotal = item.price * item.qty;
    subtotal += itemTotal;
    return `
      <div class="cart-item">
        <div class="item-top">
          <div class="item-name">${item.name}</div>
          <div class="item-price">₹${itemTotal}</div>
        </div>
        <div class="item-bottom">
          <div class="qty-control">
            <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
            <span class="qty-display">${item.qty}</span>
            <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
          </div>
          <button class="remove-item" onclick="removeItem(${index})">Remove</button>
        </div>
      </div>
    `;
  }).join('');

  // Coupon Logic
  let phone = localStorage.getItem('userPhone');
  let coupon = localStorage.getItem('arCoupon');
  let discount = 0;
  let delivery = subtotal > 1000? 0 : 40;

  if(coupon) {
    if(coupon === 'WELCOME50' && subtotal > 0) {
      discount = 50;
    } else if(coupon === 'FESTIVE10' && subtotal >= 500) {
      discount = Math.floor(subtotal * 0.1);
    } else if(coupon === 'FREEDEL' && subtotal >= 1000) {
      delivery = 0;
    }
  }

  if(discount > 0) {
    document.getElementById('couponRow').style.display = 'flex';
    document.getElementById('discount').innerText = '-₹' + discount;
  } else {
    document.getElementById('couponRow').style.display = 'none';
  }

  let total = subtotal + delivery - discount;

  document.getElementById('subtotal').innerText = '₹' + subtotal;
  document.getElementById('delivery').innerText = delivery === 0? 'FREE' : '₹' + delivery;
  document.getElementById('total').innerText = '₹' + total;
  document.getElementById('advanceAmount').innerText = total;
  document.getElementById('payAmount').innerText = total;
}

function updateQty(index, change) {
  cart[index].qty += change;
  if(cart[index].qty <= 0) {
    cart.splice(index, 1);
  }
  localStorage.setItem('arCart', JSON.stringify(cart));
  renderCart();
}

function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem('arCart', JSON.stringify(cart));
  renderCart();
}

function clearCart() {
  if(confirm('Are you sure you want to clear cart?')) {
    cart = [];
    localStorage.setItem('arCart', JSON.stringify(cart));
    renderCart();
  }
}

function showPayment() {
  if (cart.length === 0) {
    alert('Cart is empty!');
    return;
  }
  let total = parseInt(document.getElementById('total').innerText.replace('₹', ''));
  const upiId = '8298827509@fam';
  const upiUrl = `upi://pay?pa=${upiId}&pn=AdarshRetails&am=${total}&cu=INR`;
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiUrl)}`;
  document.getElementById('qrCode').src = qrUrl;
  document.getElementById('paymentSection').style.display = 'block';
  window.scrollTo(0, document.body.scrollHeight);
}

function submitAdvance() {
  const file = document.getElementById('screenshot').files[0];
  if (!file) {
    alert('Please upload payment screenshot!');
    return;
  }
  placeOrder('Full Amount Paid');
}

function cashOnDelivery() {
  placeOrder('Cash on Delivery');
}

function placeOrder(paymentType) {
  let phone = localStorage.getItem('userPhone');
  let coupon = localStorage.getItem('arCoupon');
  let total = parseInt(document.getElementById('total').innerText.replace('₹', ''));

  // 1. Coupon ko used mark karo - 1 baar hi use hoga
  if(coupon) {
    let couponKey = phone + '_' + coupon;
    if(!usedCoupons.includes(couponKey)) {
      usedCoupons.push(couponKey);
      localStorage.setItem('arUsedCoupons', JSON.stringify(usedCoupons));
    }
    localStorage.removeItem('arCoupon');
  }

  // 2. Order save karo
  let allOrders = JSON.parse(localStorage.getItem('arOrders')) || [];
  let newOrder = {
    id: Date.now(),
    phone: phone,
    items: cart,
    total: total,
    paymentType: paymentType,
    date: new Date().toLocaleDateString('hi-IN'),
    status: 'Pending'
  };
  allOrders.push(newOrder);
  localStorage.setItem('arOrders', JSON.stringify(allOrders));

  // 3. WhatsApp pe bhejo
  sendOrderToWhatsApp(newOrder);

  // 4. Cart clear karo
  cart = [];
  localStorage.setItem('arCart', JSON.stringify(cart));
  renderCart();
  document.getElementById('paymentSection').style.display = 'none';

  alert('✅ Order Placed Successfully!\n\nOrder ID: #' + newOrder.id + '\nTotal: ₹' + total + '\n\nCheck "My Orders" in profile');
}

function sendOrderToWhatsApp(order) {
  let message = '🛒 *New Order from Adarsh Retails*%0A%0A';
  message += '*Order ID:* #' + order.id + '%0A';
  message += '*Date:* ' + order.date + '%0A';
  message += '*Payment:* ' + order.paymentType + '%0A';
  message += '*Total:* ₹' + order.total + '%0A%0A';
  message += '*Items:*%0A';
  order.items.forEach((item, index) => {
    message += (index+1) + '. ' + item.name + ' x ' + item.qty + ' = ₹' + (item.price * item.qty) + '%0A';
  });

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      message += '%0A📍 *Location:*%0Ahttps://maps.google.com/?q=' + position.coords.latitude + ',' + position.coords.longitude;
      window.open('https://wa.me/918298827509?text=' + message, '_blank');
    }, function() {
      message += '%0ALocation: Not shared';
      window.open('https://wa.me/918298827509?text=' + message, '_blank');
    });
  } else {
    window.open('https://wa.me/918298827509?text=' + message, '_blank');
  }
}

renderCart();
</script>
</body>
</html>
