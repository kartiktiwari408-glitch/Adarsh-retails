<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart - adarsh retails</title>
<style>
body { font-family: Arial; background: #fff8f0; padding: 20px; }
h1 { color: #d35400; }
.item { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
button { background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
a { color: #d35400; text-decoration: none; font-weight: bold; }
</style>
</head>
<body>
<h1>🛒 Your Cart</h1>
<div id="cart-items"></div>
<button onclick="clearCart()">Clear Cart</button>

<div id="paymentSection" style="display:none; background:white; padding:15px; margin:15px 0; border-radius:8px; text-align:center;">
  <h3>Pay ₹100 Advance</h3>
  <p style="font-size:20px; color:#d35400; font-weight:bold;">₹100 (Minimum Advance)</p>
  <img id="qrCode" src="" style="width:200px; margin:10px 0;">
  <p style="color:green;">1. Scan & Pay ₹100</p>
  <p style="color:red;">2. Upload payment screenshot</p>
  <input type="file" id="screenshot" accept="image/*" style="margin:10px 0;">
  <button onclick="submitAdvance()" style="background:#25D366;">Payment Done</button>
</div>

<button onclick="showPayment()" style="background: #25D366;">Pay ₹100 Advance</button>
<button onclick="submitCOD()" style="background: #3498db;">Cash on Delivery</button>
<br><br>
<a href="index.html">← Back to Shop</a>

<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];
const cartDiv = document.getElementById('cart-items');

function displayCart() {
  if (cart.length === 0) {
    cartDiv.innerHTML = '<p>Cart is empty!</p>';
    return;
  }
  cartDiv.innerHTML = '';
  cart.forEach((item, index) => {
    let itemName = item.name || item;
    let itemPrice = item.price? ' - ₹' + item.price : '';
    cartDiv.innerHTML += '<div class="item">' + (index+1) + '. ' + itemName + itemPrice + '</div>';
  });
}

function clearCart() {
  localStorage.removeItem('cart');
  cart = [];
  displayCart();
  alert('Cart cleared!');
}

function showPayment() {
  if (cart.length === 0) {
    alert('Cart is empty!');
    return;
  }

  const upiId = '8298827509@fam';
  const upiUrl = `upi://pay?pa=${upiId}&pn=AdarshRetails&am=100&cu=INR`;
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiUrl)}`;

  document.getElementById('qrCode').src = qrUrl;
  document.getElementById('paymentSection').style.display = 'block';
}

function submitAdvance() {
  const file = document.getElementById('screenshot').files[0];
  if (!file) {
    alert('Please upload payment screenshot!');
    return;
  }

  orderWhatsApp('₹100 Advance Paid');

  setTimeout(() => {
    alert('Order sent! अब WhatsApp पर जाकर payment screenshot भेजो।');
  }, 1000);
}

function submitCOD() {
  orderWhatsApp('Cash on Delivery');
}

function orderWhatsApp(paymentType) {
  if (cart.length === 0) {
    alert('Cart is empty!');
    return;
  }

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      sendOrder(position.coords.latitude, position.coords.longitude, paymentType);
    }, function() {
      sendOrder(null, null, paymentType);
    });
  } else {
    sendOrder(null, null, paymentType);
  }
}

function sendOrder(lat, lng, paymentType) {
  let message = 'New Order from Adarsh Retails:%0A%0A';
  message += '💰 Payment: ' + paymentType + '%0A%0A';

  cart.forEach((item, index) => {
    let itemName = item.name || item;
    message += (index+1) + '. ' + itemName + '%0A';
  });

  if (lat && lng) {
    message += '%0A%0A📍 Customer Location:%0A';
    message += 'https://maps.google.com/?q=' + lat + ',' + lng + '%0A';
    message += 'Coordinates: ' + lat.toFixed(6) + ', ' + lng.toFixed(6);
  } else {
    message += '%0ALocation: Not shared';
  }

  let phone = '918298827509';
  window.open('https://wa.me/' + phone + '?text=' + message, '_blank');

  clearCart();
  document.getElementById('paymentSection').style.display = 'none';
}

displayCart();
</script>
</body>
</html>
